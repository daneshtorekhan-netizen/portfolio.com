<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Behance portfolio showcase for Danial Torekhan."
    />
    <title>Danial Torekhan | Behance Portfolio</title>
    <link rel="preconnect" href="https://mir-s3-cdn-cf.behance.net" />
    <link rel="preconnect" href="https://www.behance.net" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <header class="hero" aria-labelledby="page-title">
        <nav class="nav" aria-label="Portfolio navigation">
          <a class="brand" href="https://www.behance.net/veb_one1d5" target="_blank" rel="noreferrer">
            Danial Torekhan
          </a>
          <a class="nav-link" href="https://www.behance.net/veb_one1d5" target="_blank" rel="noreferrer">
            Behance
          </a>
        </nav>

        <section class="hero-grid">
          <div class="hero-copy">
            <p class="eyebrow">Behance portfolio</p>
            <h1 id="page-title">Danial Torekhan</h1>
            <p class="role">Graphic Designer | Video editor | Motion design</p>
            <div class="hero-actions">
              <a class="primary-link" href="https://www.behance.net/veb_one1d5" target="_blank" rel="noreferrer">
                Open Behance profile
              </a>
            </div>
          </div>

          <div class="hero-meta" aria-label="Portfolio source">
            <span>Source</span>
            <strong>Behance</strong>
            <span>Projects</span>
            <strong id="project-count">50</strong>
          </div>
        </section>
      </header>

      <section class="projects-section" aria-labelledby="projects-title">
        <div class="section-heading">
          <p class="eyebrow">Selected work</p>
          <h2 id="projects-title">Projects</h2>
        </div>
        <div class="projects-grid" id="projects-grid"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
